[server]
addr = "0.0.0.0:8080"
public_base_url = "https://tool.sqlboy.me"
max_body_bytes = 104857600

[database]
driver = "sqlite"
dsn = "file:/data/comical.db?_foreign_keys=on"

[cache]
driver = "redis"
dsn = "redis://redis:6379/0"

[cleanup]
enabled = true
interval = "30m"

[storage]
driver = "local"
local_dir = "/data/objects"

[security]
admin_token = "change-me"
content_encryption_key = "change-me-32-bytes"

[modules.short_link]
default_ttl = "168h"
allow_custom_slug = true
domain_mappings = { "s.tool.sqlboy.me" = "https://tool.sqlboy.me/short" }

[modules.image_hosting]
default_ttl = "720h"
max_bytes = 10485760

[modules.clipboard]
default_ttl = "1h"
max_visits = 5

[modules.file_stash]
default_ttl = "168h"
max_bytes = 104857600
